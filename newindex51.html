```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .animated-box {
    width: 100px;
    height: 100px;
    background-color: red;
    position: relative; /* Needed for 'left' property to work */
    border-radius: 10px;
    animation-name: slideAndColor;
    animation-duration: 3s;
    animation-iteration-count: infinite;
    animation-direction: alternate;
    animation-timing-function: ease-in-out;
  }

  @keyframes slideAndColor {
    0%   { left: -50px; background-color: red; transform: rotate(0deg); }
    50%  { left: 100px; background-color: green; transform: rotate(180deg); }
    100% { left: 250px; background-color: blue; transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="animated-box"></div>
</body>
</html>
