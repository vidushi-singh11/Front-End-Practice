```html
<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 100px;
  height: 100px;
  background-color: red;
  position: relative;
  animation: slideBox 3s infinite alternate;
}

@keyframes slideBox {
  0%   {left: 0px; background-color: red;}
  100% {left: 200px; background-color: blue;}
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
