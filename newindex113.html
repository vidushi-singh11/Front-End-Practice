```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
    overflow: hidden; /* Prevent scrollbars if animation goes slightly out */
  }

  .animated-box {
    width: 100px;
    height: 100px;
    background-color: dodgerblue;
    border-radius: 10px;
    animation: bounceColor 3s infinite alternate ease-in-out;
  }

  @keyframes bounceColor {
    0% {
      transform: translateY(0px) scale(1);
      background-color: dodgerblue;
    }
    50% {
      transform: translateY(-50px) scale(1.1);
      background-color: #ff6347; /* Tomato */
    }
    100% {
      transform: translateY(0px) scale(1);
      background-color: dodgerblue;
    }
  }
</style>
</head>
<body>
  <div class="animated-box"></div>
</body>
</html>
