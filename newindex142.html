```html
<!DOCTYPE html>
<html>
<head>
<style>
  .animated-box {
    width: 100px;
    height: 100px;
    background-color: red;
    animation: color-change 2s infinite alternate;
  }

  @keyframes color-change {
    from {background-color: red;}
    to {background-color: blue;}
  }
</style>
</head>
<body>
  <div class="animated-box"></div>
</body>
</html>
```
