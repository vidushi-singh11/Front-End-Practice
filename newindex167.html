```html
<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  box-sizing: border-box;
}

.box {
  width: 100px;
  height: 100px;
  background-color: red;
  animation: slideAndChange 3s infinite alternate;
}

@keyframes slideAndChange {
  0% {
    background-color: red;
    transform: translateX(0);
  }
  50% {
    background-color: blue;
    transform: translateX(200px);
  }
  100% {
    background-color: red;
    transform: translateX(0);
  }
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
