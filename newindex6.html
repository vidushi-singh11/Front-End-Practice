```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .box {
    width: 100px;
    height: 100px;
    background-color: dodgerblue;
    position: relative;
    animation: slideAndFade 3s infinite alternate ease-in-out;
  }

  @keyframes slideAndFade {
    0% {
      left: -100px;
      opacity: 0.5;
      background-color: dodgerblue;
      transform: rotate(0deg);
    }
    50% {
      left: 0;
      opacity: 1;
      background-color: tomato;
      transform: rotate(180deg);
    }
    100% {
      left: 100px;
      opacity: 0.5;
      background-color: mediumseagreen;
      transform: rotate(360deg);
    }
  }
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
```
