```html
<!DOCTYPE html>
<html>
<head>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            position: relative;
            animation: simpleAnimation 4s infinite alternate;
        }

        @keyframes simpleAnimation {
            0%   { background-color: blue; left: 0px; top: 0px; }
            25%  { background-color: red; left: 100px; top: 0px; }
            50%  { background-color: green; left: 100px; top: 100px; }
            75%  { background-color: orange; left: 0px; top: 100px; }
            100% { background-color: blue; left: 0px; top: 0px; }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
