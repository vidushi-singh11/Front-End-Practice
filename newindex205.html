```html
<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 100px;
  height: 100px;
  background-color: blue;
  position: relative;
  animation-name: moveBox;
  animation-duration: 3s;
  animation-iteration-count: infinite;
  animation-direction: alternate;
}

@keyframes moveBox {
  0%   {left: 0px; background-color: blue;}
  100% {left: 200px; background-color: red;}
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
