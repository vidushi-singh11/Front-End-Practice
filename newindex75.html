```html
<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background-color: #f0f0f0;
}

.box {
  width: 100px;
  height: 100px;
  background-color: dodgerblue;
  animation: bounce 2s infinite alternate;
}

@keyframes bounce {
  0% {
    transform: translateY(0);
    background-color: dodgerblue;
  }
  100% {
    transform: translateY(-50px);
    background-color: orange;
  }
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
