```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .box {
    width: 100px;
    height: 100px;
    background-color: dodgerblue;
    animation: rotateBox 2s linear infinite;
  }

  @keyframes rotateBox {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
```
