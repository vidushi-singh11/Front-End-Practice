```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
}

.box {
    width: 100px;
    height: 100px;
    background-color: #3498db;
    border-radius: 10px;
    animation: colorAndMove 3s infinite alternate ease-in-out;
}

@keyframes colorAndMove {
    0% {
        background-color: #3498db;
        transform: translateX(0) scale(1);
    }
    50% {
        background-color: #e74c3c;
        transform: translateX(50px) scale(1.1);
    }
    100% {
        background-color: #2ecc71;
        transform: translateX(0) scale(1);
    }
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
```
