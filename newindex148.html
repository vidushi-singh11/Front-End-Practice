```html
<!DOCTYPE html>
<html>
<head>
    <title>Simple CSS Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        .animated-box {
            width: 100px;
            height: 100px;
            background-color: dodgerblue;
            position: relative;
            animation: slide 2s infinite alternate ease-in-out;
        }

        @keyframes slide {
            0% {
                left: -150px;
                transform: rotate(0deg);
                background-color: dodgerblue;
            }
            100% {
                left: 150px;
                transform: rotate(360deg);
                background-color: coral;
            }
        }
    </style>
</head>
<body>
    <div class="animated-box"></div>
</body>
</html>
