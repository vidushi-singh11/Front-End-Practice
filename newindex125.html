```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .box {
    width: 100px;
    height: 100px;
    background-color: dodgerblue;
    animation: pulse 2s infinite alternate;
  }

  @keyframes pulse {
    0% {
      transform: scale(1);
      background-color: dodgerblue;
    }
    100% {
      transform: scale(1.2);
      background-color: crimson;
    }
  }
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
```
