```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #f0f0f0;
  }

  .animated-box {
    width: 100px;
    height: 100px;
    background-color: dodgerblue;
    position: relative;
    top: 50px;
    left: 50px;
    border-radius: 10px;
    animation: slideAndColor 3s infinite alternate ease-in-out;
  }

  @keyframes slideAndColor {
    0% {
      left: 50px;
      background-color: dodgerblue;
      transform: rotate(0deg);
    }
    50% {
      left: 300px;
      background-color: lightgreen;
      transform: rotate(180deg);
    }
    100% {
      left: 50px;
      background-color: tomato;
      transform: rotate(360deg);
    }
  }
</style>
</head>
<body>

<div class="animated-box"></div>

</body>
</html>
```
