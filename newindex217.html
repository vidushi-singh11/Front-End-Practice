```html
<!DOCTYPE html>
<html>
<head>
    <title>Simple CSS Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            overflow: hidden; /* Prevent scrollbar if box moves out of view */
        }

        .animated-box {
            width: 100px;
            height: 100px;
            background-color: red;
            border-radius: 10px;
            animation: pulseColorAndMove 3s infinite alternate ease-in-out;
        }

        @keyframes pulseColorAndMove {
            0% {
                background-color: red;
                transform: translateX(-100px) scale(1);
            }
            50% {
                background-color: blue;
                transform: translateX(100px) scale(1.2);
            }
            100% {
                background-color: green;
                transform: translateX(-100px) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="animated-box"></div>
</body>
</html>
