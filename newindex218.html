```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .box {
    width: 100px;
    height: 100px;
    background-color: #3498db;
    border-radius: 10px;
    animation: moveAndColor 2s infinite alternate ease-in-out;
  }

  @keyframes moveAndColor {
    0% {
      transform: translateX(-100px);
      background-color: #3498db;
    }
    100% {
      transform: translateX(100px);
      background-color: #e74c3c;
    }
  }
</style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
