```html
<!DOCTYPE html>
<html>
<head>
<title>Hover Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f2f5;
    font-family: sans-serif;
  }

  .card {
    width: 250px;
    height: 150px;
    background-color: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #333;
    font-size: 1.2em;
    font-weight: bold;
    transition: transform 0.3s ease-out, box-shadow 0.3s ease-out;
  }

  .card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="card">
  Hover Me
</div>

</body>
</html>
```
