```html
<!DOCTYPE html>
<html>
<head>
    <title>Simple Animation</title>
    <style>
        .animated-box {
            width: 100px;
            height: 100px;
            background-color: dodgerblue;
            position: relative;
            animation: moveBox 3s infinite alternate;
        }

        @keyframes moveBox {
            0% {
                left: 0;
                background-color: dodgerblue;
            }
            50% {
                left: calc(100% - 100px);
                background-color: tomato;
            }
            100% {
                left: 0;
                background-color: dodgerblue;
            }
        }
    </style>
</head>
<body>
    <div class="animated-box"></div>
</body>
</html>
