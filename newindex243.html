```html
<!DOCTYPE html>
<html>
<head>
<title>Simple CSS Animation</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
}

.box {
    width: 100px;
    height: 100px;
    background-color: #3498db;
    border-radius: 10px;
    animation: moveBox 2s infinite alternate ease-in-out;
}

@keyframes moveBox {
    0% {
        transform: translateX(-100px) scale(1);
        background-color: #3498db;
    }
    50% {
        transform: translateX(100px) scale(1.2);
        background-color: #e74c3c;
    }
    100% {
        transform: translateX(-100px) scale(1);
        background-color: #3498db;
    }
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
```
