```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }
  .box {
    width: 100px;
    height: 100px;
    background-color: dodgerblue;
    border-radius: 10px;
    animation: simpleMoveAndColor 3s infinite alternate;
  }

  @keyframes simpleMoveAndColor {
    0% {
      transform: translateX(-50px) rotate(0deg);
      background-color: dodgerblue;
    }
    50% {
      transform: translateX(50px) rotate(180deg);
      background-color: tomato;
    }
    100% {
      transform: translateX(-50px) rotate(360deg);
      background-color: dodgerblue;
    }
  }
</style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
