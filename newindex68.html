```html
<!DOCTYPE html>
<html>
<head>
<style>
  .box {
    width: 100px;
    height: 100px;
    background-color: dodgerblue;
    position: relative;
    animation: moveBox 2s infinite alternate;
  }

  @keyframes moveBox {
    0%   { left: 0px; background-color: dodgerblue; }
    100% { left: 200px; background-color: tomato; }
  }
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
