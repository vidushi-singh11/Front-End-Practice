```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
    overflow: hidden;
}

.box {
    width: 100px;
    height: 100px;
    background-color: #3498db;
    animation: pulse 2s infinite alternate;
}

@keyframes pulse {
    from {
        transform: scale(1);
        background-color: #3498db;
    }
    to {
        transform: scale(1.2);
        background-color: #e74c3c;
    }
}
</style>
</head>
<body>
<div class="box"></div>
</body>
</html>
