```html
<!DOCTYPE html>
<html>
<head>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background-color: #f0f0f0;
}

.box {
  width: 100px;
  height: 100px;
  background-color: #3498db;
  animation: colorChange 2s infinite alternate;
}

@keyframes colorChange {
  0% {
    background-color: #3498db;
    transform: scale(1);
  }
  100% {
    background-color: #e74c3c;
    transform: scale(1.2);
  }
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
