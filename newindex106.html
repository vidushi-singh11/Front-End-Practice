```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .box {
    width: 100px;
    height: 100px;
    background-color: red;
    animation: color-bounce 3s infinite alternate;
  }

  @keyframes color-bounce {
    0% { background-color: red; transform: translateY(0); }
    50% { background-color: blue; transform: translateY(-50px) scale(1.2); }
    100% { background-color: green; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
