```html
<!DOCTYPE html>
<html>
<head>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
    font-family: Arial, sans-serif;
}

.card {
    width: 250px;
    padding: 25px;
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    text-align: center;
    color: #333;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
}

.card h2 {
    color: #007bff;
    margin-bottom: 10px;
}

.card p {
    font-size: 0.9em;
    line-height: 1.5;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
}
</style>
</head>
<body>

<div class="card">
    <h2>Hover Me</h2>
    <p>This is a simple card with a subtle lift and scale effect on hover.</p>
</div>

</body>
</html>
```
