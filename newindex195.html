```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .box {
    width: 100px;
    height: 100px;
    background-color: #3498db;
    border-radius: 10px;
    animation: colorChange 3s infinite alternate; /* Applies the animation */
  }

  @keyframes colorChange {
    0% {
      background-color: #3498db; /* Start color */
      transform: scale(1);
    }
    50% {
      background-color: #e74c3c; /* Mid color */
      transform: scale(1.2);
    }
    100% {
      background-color: #2ecc71; /* End color */
      transform: scale(1);
    }
  }
</style>
</head>
<body>

  <div class="box"></div>

</body>
</html>
