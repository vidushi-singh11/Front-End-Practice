```html
<!DOCTYPE html>
<html>
<head>
<title>Simple Animation</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background-color: #f0f0f0;
}

.box {
  width: 100px;
  height: 100px;
  background-color: red;
  animation: simpleMove 2s infinite alternate;
}

@keyframes simpleMove {
  0% {
    transform: translateX(0);
    background-color: red;
  }
  100% {
    transform: translateX(100px);
    background-color: blue;
  }
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
```
