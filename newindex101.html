```html
<!DOCTYPE html>
<html>
<head>
<title>Simple CSS Animation</title>
<style>
  .animated-box {
    width: 100px;
    height: 100px;
    background-color: red;
    position: relative;
    animation: slideAndColor 4s infinite alternate; /* Applies the animation */
  }

  @keyframes slideAndColor {
    0% {
      background-color: red;
      left: 0px;
      top: 0px;
    }
    25% {
      background-color: blue;
      left: 100px;
      top: 0px;
    }
    50% {
      background-color: green;
      left: 100px;
      top: 100px;
    }
    75% {
      background-color: purple;
      left: 0px;
      top: 100px;
    }
    100% {
      background-color: red;
      left: 0px;
      top: 0px;
    }
  }
</style>
</head>
<body>

<div class="animated-box"></div>

</body>
</html>
```
