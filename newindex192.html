```html
<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 100px;
  height: 100px;
  background-color: red;
  position: relative;
  animation: simpleMoveAndColor 2s infinite alternate;
}

@keyframes simpleMoveAndColor {
  0% {
    background-color: red;
    left: 0px;
    top: 0px;
  }
  50% {
    background-color: blue;
    left: 100px;
    top: 50px;
  }
  100% {
    background-color: red;
    left: 0px;
    top: 0px;
  }
}
</style>
</head>
<body>
<div class="box"></div>
</body>
</html>
